services:
  # Postgres
  postgres:
    image: postgres:15
    container_name: vergil_postgres15
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST_AUTH_METHOD=md5
    volumes:
      - ./.pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command: [ "postgres", "-c", "listen_addresses=*"]
    networks:
      - graphite_network
  
  # Pgadmin
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vergil_pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${pg_admin_email}
      - PGADMIN_DEFAULT_PASSWORD=${pg_admin_password}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - graphite_network

  # MCP Server 
  mcp_server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: vergil_mcp_server
    ports:
      - "8082:8081"
    volumes:
      - ./services/mcp_server/src/contracts:/app/src/contracts
    environment:
      - ETHEREUM_SEPOLIA_RPC=${ETHEREUM_SEPOLIA_RPC}
    networks:
      - graphite_network

  # OpenZeppelin MCP Server (via mcp-proxy)
  oz_mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile.oz-mcp
    container_name: vergil_oz_mcp
    ports:
      - "8083:8082"
    networks:
      - graphite_network

  # Backend
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: backend_api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mcp_server
      - oz_mcp
      - phoenix
    environment:
      - ZAI_API_KEY=${ZAI_API_KEY}
      - ZAI_MODEL=${ZAI_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - MCP_SERVER_URL=${MCP_SERVER_URL}
      - OZ_MCP_SERVER_URL=${OZ_MCP_SERVER_URL:-http://oz_mcp:8082/mcp/}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=postgres
      - PHOENIX_ENDPOINT=${PHOENIX_ENDPOINT}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - ETHEREUM_SEPOLIA_RPC=${ETHEREUM_SEPOLIA_RPC}
    networks:
      - graphite_network
    command: sh -c "sleep 10 && uv run uvicorn main:app --host 0.0.0.0 --port 8000"
  
  # Frontend 
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: vergil_frontend_app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - BACKEND_API_URL=${BACKEND_API_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
    networks:
      - graphite_network

  # Phoenix
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"   # Phoenix UI
      - "4317:4317"   # OTLP gRPC for tracing
    networks:
      - graphite_network

networks:
  graphite_network:
    driver: bridge
