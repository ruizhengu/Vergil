[railway]
version = 2

[project]
name = "smart-contract-agent"

[[service]]
name = "backend"
dockerfile = "docker/Dockerfile.backend"
startCommand = "sh -c 'uv run uvicorn main:app --host 0.0.0.0 --port ${PORT}'"

[[service]]
name = "mcp_server"
dockerfile = "docker/Dockerfile.server"
startCommand = "sh -c 'uv run python -m uvicorn servers.server:app --host 0.0.0.0 --port ${PORT}'"

[deploy]
region = "us"
